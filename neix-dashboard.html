<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neix — Dashboard de Rentabilidad</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bordeaux: #AB1930;
  --grafito:  #3D3D3D;
  --gris:     #E4E4E4;
  --crema:    #F7F5F3;
  --arena:    #9A8E7D;
  --verde:    #004836;
  --azul:     #476785;
  --azul-osc: #003F61;
  --surface:  #FFFFFF;
  --border:   #E8E6E3;
  --text:     #3D3D3D;
  --muted:    #9A8E7D;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--crema);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{
  width:216px;flex-shrink:0;
  background:var(--grafito);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto
}
.sidebar-logo{padding:26px 22px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo svg{width:130px;height:auto}
.sidebar-section{padding:18px 22px 6px;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 22px;cursor:pointer;
  color:rgba(255,255,255,.55);font-size:13px;
  border-left:3px solid transparent;
  transition:all .15s;user-select:none
}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.85)}
.nav-item.active{border-left-color:var(--bordeaux);background:rgba(171,25,48,.11);color:#fff;font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.sidebar-foot{margin-top:auto;padding:14px 22px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:rgba(255,255,255,.25);font-family:'DM Mono',monospace}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── TOPBAR ── */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 30px;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10
}
.topbar-title{font-size:15px;font-weight:600;color:var(--grafito)}
.topbar-right{display:flex;align-items:center;gap:14px}
.month-tabs{display:flex;gap:4px}
.month-tab{
  padding:4px 12px;border-radius:5px;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--muted);
  border:1px solid transparent;transition:all .15s
}
.month-tab:hover{background:var(--crema);color:var(--grafito)}
.month-tab.active{background:var(--grafito);color:#fff;border-color:var(--grafito)}
.status-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--arena);flex-shrink:0}

/* ── CONTENT ── */
.content{flex:1;padding:26px 30px 40px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── SECTION HEADER ── */
.section-hd{margin-bottom:22px}
.section-title{font-size:19px;font-weight:600;margin-bottom:3px}
.section-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:16px 18px;position:relative;overflow:hidden
}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--bordeaux)}
.kpi-card.c-verde::before{background:var(--verde)}
.kpi-card.c-azul::before{background:var(--azul-osc)}
.kpi-card.c-arena::before{background:var(--arena)}
.kpi-card.c-azulmed::before{background:var(--azul)}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
.kpi-val{font-family:'DM Mono',monospace;font-size:21px;font-weight:500;line-height:1;margin-bottom:3px}
.kpi-val.pos{color:var(--verde)}
.kpi-val.neg{color:var(--bordeaux)}
.kpi-val.neu{color:var(--grafito)}
.kpi-hint{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:20px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:18px;margin-bottom:20px}
@media(max-width:1100px){.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr}.sidebar{width:56px}.sidebar-section,.nav-item span,.sidebar-logo svg{display:none}}

/* ── CHART CARD ── */
.cc{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:18px 20px}
.cc-title{font-size:13px;font-weight:600;margin-bottom:2px}
.cc-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:14px}
.cc-wrap{position:relative;width:100%}

/* ── TABLE ── */
.tc{background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:22px}
.tc-hd{padding:12px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.tc-hd span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;font-weight:400}
table{width:100%;border-collapse:collapse}
thead th{background:var(--crema);padding:9px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);border-bottom:1px solid var(--border)}
thead th.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#faf9f8}
tbody td{padding:9px 14px;font-size:12px}
tbody td.r{text-align:right;font-family:'DM Mono',monospace;font-size:11px}
td.pos{color:var(--verde);font-weight:500}
td.neg{color:var(--bordeaux);font-weight:500}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;background:var(--crema);color:var(--muted);border:1px solid var(--border)}
.chip{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-family:'DM Mono',monospace;font-weight:500}
.chip.pos{background:rgba(0,72,54,.1);color:var(--verde)}
.chip.neg{background:rgba(171,25,48,.1);color:var(--bordeaux)}

/* ── STATE ── */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:10px;color:var(--muted)}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--bordeaux);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-msg{font-size:12px;font-family:'DM Mono',monospace}

/* ── HBAR ── */
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.hbar-lbl{width:148px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.hbar-track{flex:1;height:12px;background:var(--gris);border-radius:3px;overflow:hidden}
.hbar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.hbar-val{width:88px;text-align:right;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0}

/* ── INSIGHT ── */
.insight-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:12px}
.insight-row:last-child{border-bottom:none}
.insight-lbl{font-size:12px;color:var(--muted)}
.insight-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;white-space:nowrap}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 362">
      <polygon fill="#AB1930" points="903.6 134.65 941.09 78.2 985.97 78.2 948.48 134.65 903.6 134.65"/>
      <rect fill="#FFFFFF" x="660.23" y="78.2" width="44.88" height="215.67"/>
      <polygon fill="#FFFFFF" points="542.86 115.16 542.86 78.18 405.26 78.18 405.26 78.2 394.59 78.2 394.59 293.87 439.47 293.87 439.47 293.86 542.86 293.86 542.86 256.88 439.47 256.88 439.47 202.62 529.47 202.62 529.47 165.64 439.47 165.64 439.47 115.16 542.86 115.16"/>
      <polygon fill="#FFFFFF" points="277.26 293.08 277.26 78.2 235.28 78.2 235.28 230 134.24 78.2 89.36 78.2 89.38 78.23 89.3 78.2 89.3 293.98 131.28 293.98 131.28 141.19 232.91 293.87 277.79 293.87 277.26 293.08"/>
      <polygon fill="#FFFFFF" points="989.85 293.87 846.31 78.2 801.42 78.2 869.57 180.59 794.17 293.87 839.05 293.87 892.01 214.31 944.97 293.87 989.85 293.87"/>

<!-- MAIN -->
<div class="main">
  <header class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard de Rentabilidad</div>
    <div class="topbar-right">
      <div class="month-tabs" id="month-tabs"></div>
      <div class="status-pill">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-txt">Cargando…</span>
      </div>
    </div>
  </header>
  <div class="content" id="content">

      <div class="spinner"></div>
      <div class="state-msg">Conectando con Google Sheets…</div>
    </div>
  </div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4gdsYZTOZlI1jllNuQ2mBWBjabHVL5vJ9dPGVso5lnUVOOuRsQ_xhKVfa0XYDlKpPGr61FUnO3kvy/pub?output=csv&gid=';

const SHEETS = [
  { mes: 'Enero',    gid: '1110798794' },
  { mes: 'Febrero',  gid: '1987596460' },
  { mes: 'Marzo',    gid: '1623267692' },
  { mes: 'Abril',    gid: '0'          },
];

const AREAS = ['Mesa', 'Banca Corporativa', 'Banca Privada', 'Middle Office'];

const AREA_COLOR = {
  'Mesa':              '#003F61',
  'Banca Corporativa': '#AB1930',
  'Banca Privada':     '#004836',
  'Middle Office':     '#9A8E7D',
};

const ROW_ING  = 'FACTURACIÓN POR ÁREA';
const ROW_GDIR = 'GASTOS DIRECTOS';
const ROW_GIND = 'GASTOS INDIRECTOS';
const ROW_SKIP = 'GASTOS TOTALES POR ÁREA';

// ── PARSE ────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (!lines.length) return [];
  // headers
  const headers = splitCSVLine(lines[0]).map(h => h.trim());
  return lines.slice(1)
    .map(l => {
      const cols = splitCSVLine(l);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (cols[i] || '').trim());
      return obj;
    })
    .filter(r => Object.values(r).some(v => v !== ''));
}

function splitCSVLine(line) {
  const cols = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { inQ = !inQ; continue; }
    if (line[i] === ',' && !inQ) { cols.push(cur); cur = ''; }
    else cur += line[i];
  }
  cols.push(cur);
  return cols;
}

function parseNum(v) {
  if (!v || v === '' || v === '-') return 0;
  const s = String(v).replace(/\s/g,'').replace(/['"]/g,'');
  if (s.includes('.') && s.includes(',')) return parseFloat(s.replace(/\./g,'').replace(',','.')) || 0;
  if (s.includes(',') && !s.includes('.')) return parseFloat(s.replace(',','.')) || 0;
  return parseFloat(s) || 0;
}

// ── DETECT nombre column ─────────────────────────────────────
function getNombreCol(row) {
  return Object.keys(row).find(k =>
    k.toLowerCase().includes('nombre') || k.toLowerCase().includes('cuenta') || k === 'Nombre de cuenta'
  ) || Object.keys(row)[1];
}

// ── BUILD MES DATA ───────────────────────────────────────────
// Returns { area: { ingresos, gastos_dir, gastos_ind, egresos, resultado } }
function buildMesData(rows) {
  if (!rows.length) return {};
  const nomCol = getNombreCol(rows[0]);

  const result = {};
  AREAS.forEach(a => result[a] = { ingresos: 0, gastos_dir: 0, gastos_ind: 0, egresos: 0, resultado: 0 });

  rows.forEach(row => {
    const nom = (row[nomCol] || '').toUpperCase().trim();
    if (!nom) return;

    // Detect row type
    let tipo = null;
    if (nom.includes('FACTURACIÓN') || nom.includes('FACTURACION')) tipo = 'ing';
    else if (nom.includes('GASTOS DIRECTOS') || nom === ROW_GDIR.toUpperCase()) tipo = 'dir';
    else if (nom.includes('GASTOS INDIRECTOS') || nom === ROW_GIND.toUpperCase()) tipo = 'ind';
    else if (nom.includes('GASTOS TOTALES') || nom === ROW_SKIP.toUpperCase()) tipo = 'skip';

    if (!tipo || tipo === 'skip') return;

    AREAS.forEach(a => {
      // Try exact match first, then partial
      let val = parseNum(row[a]);
      if (!val) {
        // Try case-insensitive
        const key = Object.keys(row).find(k => k.trim().toLowerCase() === a.toLowerCase());
        if (key) val = parseNum(row[key]);
      }
      if (tipo === 'ing') result[a].ingresos  += val;
      if (tipo === 'dir') result[a].gastos_dir += val;
      if (tipo === 'ind') result[a].gastos_ind += val;
    });
  });

  // Totals
  AREAS.forEach(a => {
    result[a].egresos   = result[a].gastos_dir + result[a].gastos_ind;
    result[a].resultado = result[a].ingresos - result[a].egresos;
  });

  return result;
}

// ── FORMAT ───────────────────────────────────────────────────
function fmt(n, compact = false) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (compact) {
    if (abs >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (abs >= 1e3) return (n / 1e3).toFixed(0) + 'k';
    return n.toFixed(0);
  }
  return new Intl.NumberFormat('es-AR', { maximumFractionDigits: 0 }).format(n);
}
const $ = (n, c) => 'USD ' + fmt(n, c);
const pct = (v, t) => t ? (v / t * 100).toFixed(1) + '%' : '—';
const sign = n => n >= 0 ? 'pos' : 'neg';

// ── CHART REGISTRY ───────────────────────────────────────────
const charts = {};
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }
function reg(id, c) { charts[id] = c; }

Chart.defaults.font.family = "'DM Sans', sans-serif";
Chart.defaults.color = '#9A8E7D';
Chart.defaults.plugins.legend.labels.boxWidth = 11;
Chart.defaults.plugins.legend.labels.padding = 14;

// ── CHART BUILDERS ───────────────────────────────────────────
function makeGrouped(id, areas, data) {
  destroyChart(id);
  const ctx = document.getElementById(id); if (!ctx) return;
  reg(id, new Chart(ctx, {
    type: 'bar',
    data: {
      labels: areas,
      datasets: [
        { label: 'Ingresos',  data: areas.map(a => data[a].ingresos),  backgroundColor: '#003F61', borderRadius: 4 },
        { label: 'Egresos',   data: areas.map(a => data[a].egresos),   backgroundColor: '#E4E4E4', borderRadius: 4 },
        { label: 'Resultado', data: areas.map(a => data[a].resultado), backgroundColor: areas.map(a => data[a].resultado >= 0 ? '#004836' : '#AB1930'), borderRadius: 4 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: c => ' ' + $(c.raw) } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: '#E8E6E3' }, ticks: { callback: v => $(v, true), font: { family: 'DM Mono', size: 10 } } }
      }
    }
  }));
}

function makeDoughnut(id, areas, data, key) {
  destroyChart(id);
  const ctx = document.getElementById(id); if (!ctx) return;
  reg(id, new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: areas,
      datasets: [{ data: areas.map(a => data[a][key]), backgroundColor: areas.map(a => AREA_COLOR[a]), borderWidth: 0, hoverOffset: 5 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '62%',
      plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: c => ' ' + $(c.raw) } } }
    }
  }));
}

function makeLine(id, meses, mesData, key) {
  destroyChart(id);
  const ctx = document.getElementById(id); if (!ctx) return;
  reg(id, new Chart(ctx, {
    type: 'line',
    data: {
      labels: meses,
      datasets: AREAS.map(a => ({
        label: a,
        data: meses.map(m => mesData[m] ? mesData[m][a][key] : null),
        borderColor: AREA_COLOR[a], backgroundColor: 'transparent',
        pointBackgroundColor: AREA_COLOR[a], pointRadius: 4,
        tension: 0.3, borderWidth: 2, spanGaps: true,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: c => ' ' + $(c.raw) } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: '#E8E6E3' }, ticks: { callback: v => $(v, true), font: { family: 'DM Mono', size: 10 } } }
      }
    }
  }));
}

function makeStackedBar(id, meses, mesData) {
  destroyChart(id);
  const ctx = document.getElementById(id); if (!ctx) return;
  reg(id, new Chart(ctx, {
    type: 'bar',
    data: {
      labels: meses,
      datasets: AREAS.map(a => ({
        label: a,
        data: meses.map(m => mesData[m] ? mesData[m][a].ingresos : 0),
        backgroundColor: AREA_COLOR[a], borderRadius: 3, stack: 'ing',
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: c => ' ' + $(c.raw) } } },
      scales: {
        x: { grid: { display: false }, stacked: true, ticks: { font: { size: 11 } } },
        y: { grid: { color: '#E8E6E3' }, stacked: true, ticks: { callback: v => $(v, true), font: { family: 'DM Mono', size: 10 } } }
      }
    }
  }));
}

function makeHorizBar(id, areas, data, key, color) {
  destroyChart(id);
  const ctx = document.getElementById(id); if (!ctx) return;
  reg(id, new Chart(ctx, {
    type: 'bar',
    data: {
      labels: areas,
      datasets: [{ data: areas.map(a => data[a][key]), backgroundColor: areas.map(a => AREA_COLOR[a]), borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' ' + $(c.raw) } } },
      scales: {
        x: { grid: { color: '#E8E6E3' }, ticks: { callback: v => $(v, true), font: { family: 'DM Mono', size: 10 } } },
        y: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  }));
}

function makeCostStructure(id, areas, data) {
  destroyChart(id);
  const ctx = document.getElementById(id); if (!ctx) return;
  reg(id, new Chart(ctx, {
    type: 'bar',
    data: {
      labels: areas,
      datasets: [
        { label: 'Gastos directos',   data: areas.map(a => data[a].gastos_dir), backgroundColor: '#476785', borderRadius: 4, stack: 'cost' },
        { label: 'Gastos indirectos', data: areas.map(a => data[a].gastos_ind), backgroundColor: '#9A8E7D', borderRadius: 4, stack: 'cost' },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: c => ' ' + $(c.raw) } } },
      scales: {
        x: { grid: { display: false }, stacked: true, ticks: { font: { size: 11 } } },

// ── RENDER HELPERS ───────────────────────────────────────────
function kpiGrid(data, mes) {
  const totIng = AREAS.reduce((s, a) => s + data[a].ingresos, 0);
  const totEgr = AREAS.reduce((s, a) => s + data[a].egresos, 0);
  const totRes = AREAS.reduce((s, a) => s + data[a].resultado, 0);
  const margen = totIng ? (totRes / totIng * 100) : 0;

  return `<div class="kpi-grid">
    <div class="kpi-card c-azul">
      <div class="kpi-label">Ingresos totales</div>
      <div class="kpi-val neu">${$(totIng, true)}</div>
      <div class="kpi-hint">Facturación consolidada</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Egresos totales</div>
      <div class="kpi-val neu">${$(totEgr, true)}</div>
      <div class="kpi-hint">${pct(totEgr, totIng)} de ingresos</div>
    </div>
    <div class="kpi-card ${totRes >= 0 ? 'c-verde' : ''}">
      <div class="kpi-label">Resultado neto</div>
      <div class="kpi-val ${sign(totRes)}">${$(totRes, true)}</div>
      <div class="kpi-hint">Margen ${margen.toFixed(1)}%</div>
    </div>
    ${AREAS.map(a => {
      const d = data[a];
      const m = d.ingresos ? (d.resultado / d.ingresos * 100) : 0;
      const cls = a === 'Mesa' ? 'c-azul' : a === 'Banca Corporativa' ? '' : a === 'Banca Privada' ? 'c-verde' : 'c-arena';
      return `<div class="kpi-card ${cls}">
        <div class="kpi-label">${a}</div>
        <div class="kpi-val ${sign(d.resultado)}">${$(d.resultado, true)}</div>
        <div class="kpi-hint">Margen ${m.toFixed(1)}%</div>
      </div>`;
    }).join('')}
  </div>`;
}

  state.meses.forEach(m => {
    AREAS.forEach(a => { Object.keys(agg[a]).forEach(k => agg[a][k] += state.mesData[m][a][k]); });
  });

  const totIng = AREAS.reduce((s, a) => s + agg[a].ingresos, 0);
  const totEgr = AREAS.reduce((s, a) => s + agg[a].egresos, 0);
  const totRes = AREAS.reduce((s, a) => s + agg[a].resultado, 0);
  const totDir = AREAS.reduce((s, a) => s + agg[a].gastos_dir, 0);
  const totInd = AREAS.reduce((s, a) => s + agg[a].gastos_ind, 0);

  const margenGen = totIng ? totRes / totIng * 100 : 0;
  const costRatio = totIng ? totEgr / totIng * 100 : 0;
  const apalDir   = totEgr ? totDir / totEgr * 100 : 0;

  const best  = AREAS.reduce((b, a) => agg[a].resultado > agg[b].resultado ? a : b, AREAS[0]);
  const worst = AREAS.reduce((b, a) => agg[a].resultado < agg[b].resultado ? a : b, AREAS[0]);

  const margins = AREAS.map(a => ({ a, m: agg[a].ingresos ? agg[a].resultado / agg[a].ingresos * 100 : 0 }));
  const spread  = Math.max(...margins.map(x => x.m)) - Math.min(...margins.map(x => x.m));

  // Best month
  const mesByRes = state.meses.map(m => ({
    m, r: AREAS.reduce((s, a) => s + state.mesData[m][a].resultado, 0)

        <div class="kpi-hint">Egresos / Ingresos</div>
      </div>
      <div class="kpi-card c-arena">
        <div class="kpi-label">Spread de márgenes</div>
        <div class="kpi-val neu">${spread.toFixed(1)}pp</div>
        <div class="kpi-hint">Dispersión entre áreas</div>
      </div>
      <div class="kpi-card c-azul">
        <div class="kpi-label">Gastos directos / Egresos</div>
        <div class="kpi-val neu">${apalDir.toFixed(1)}%</div>
        <div class="kpi-hint">${$(totDir, true)} de ${$(totEgr, true)}</div>
      </div>
      <div class="kpi-card c-arena">
        <div class="kpi-label">Gastos indirectos / Egresos</div>
        <div class="kpi-val neu">${(100 - apalDir).toFixed(1)}%</div>
        <div class="kpi-hint">${$(totInd, true)}</div>
      </div>
      <div class="kpi-card ${totRes >= 0 ? 'c-verde' : ''}">
        <div class="kpi-label">Resultado promedio/mes</div>
        <div class="kpi-val ${sign(totRes)}">${$(totRes / state.meses.length, true)}</div>
        <div class="kpi-hint">${state.meses.length} meses</div>
      </div>
    </div>

    <div class="g2">
      <div class="cc">
        <div class="cc-title">Márgenes por área</div>

          <div class="hbar-row">
            <div class="hbar-lbl">${a}</div>
            <div class="hbar-track"><div class="hbar-fill" style="width:${Math.min(Math.abs(m), 100)}%;background:${m >= 0 ? '#004836' : '#AB1930'}"></div></div>
            <div class="hbar-val"><span class="chip ${sign(m)}">${m.toFixed(1)}%</span></div>
          </div>`).join('')}
      </div>
      <div class="cc">
        <div class="cc-title">Análisis de referencia</div>
        <div class="cc-sub">Insights consolidados</div>
        <div class="insight-row">
          <div class="insight-lbl">Área más rentable</div>
          <div class="insight-val" style="color:var(--verde)">${best} · ${$(agg[best].resultado, true)}</div>

        <div class="insight-row">
          <div class="insight-lbl">Área con menor resultado</div>

// ── DRAW CHARTS ──────────────────────────────────────────────
function drawCharts(tab) {
  const agg = {};
  AREAS.forEach(a => agg[a] = { ingresos: 0, gastos_dir: 0, gastos_ind: 0, egresos: 0, resultado: 0 });
  state.meses.forEach(m => {
    AREAS.forEach(a => { Object.keys(agg[a]).forEach(k => agg[a][k] += state.mesData[m][a][k]); });
  });

  if (tab === 'por-mes') {
    const mes = state.currentMes || state.meses[state.meses.length - 1];
    const data = state.mesData[mes];
    makeGrouped('ch-grouped', AREAS, data);
    makeCostStructure('ch-cost', AREAS, data);
  }

  if (tab === 'consolidado') {
    makeGrouped('ch-cons-grouped', AREAS, agg);
    makeStackedBar('ch-stacked', state.meses, state.mesData);
    makeDoughnut('ch-dough-ing', AREAS, agg, 'ingresos');
    makeDoughnut('ch-dough-egr', AREAS, agg, 'egresos');
  }

  if (tab === 'comparativa') {
    makeHorizBar('ch-comp-res', AREAS, agg, 'resultado');
    // Margen chart
    destroyChart('ch-comp-margen');
    const ctx = document.getElementById('ch-comp-margen'); if (ctx) {
      const margins = AREAS.map(a => agg[a].ingresos ? agg[a].resultado / agg[a].ingresos * 100 : 0);
      reg('ch-comp-margen', new Chart(ctx, {
        type: 'bar', indexAxis: 'y',
        data: { labels: AREAS, datasets: [{ data: margins, backgroundColor: margins.map((m, i) => m >= 0 ? AREA_COLOR[AREAS[i]] : '#AB1930'), borderRadius: 4 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' ' + c.raw.toFixed(1) + '%' } } },
          scales: {
            x: { grid: { color: '#E8E6E3' }, ticks: { callback: v => v + '%', font: { family: 'DM Mono', size: 10 } } },
            y: { grid: { display: false }, ticks: { font: { size: 11 } } }
          }
        }
      }));
    }
    makeLine('ch-comp-line', state.meses, state.mesData, 'resultado');
  }

  if (tab === 'metricas') {
    makeCostStructure('ch-metr-cost', AREAS, agg);
    // Total result line
    destroyChart('ch-metr-line');
    const ctx = document.getElementById('ch-metr-line'); if (ctx) {
      const totals = state.meses.map(m => AREAS.reduce((s, a) => s + state.mesData[m][a].resultado, 0));
      reg('ch-metr-line', new Chart(ctx, {
        type: 'line',
        data: {
          labels: state.meses,
          datasets: [{
            label: 'Resultado neto total',
            data: totals,
            borderColor: '#004836', backgroundColor: 'rgba(0,72,54,.08)',
            pointBackgroundColor: '#004836', pointRadius: 5,
            tension: 0.3, borderWidth: 2, fill: true,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' ' + $(c.raw) } } },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 11 } } },
            y: { grid: { color: '#E8E6E3' }, ticks: { callback: v => $(v, true), font: { family: 'DM Mono', size: 10 } } }
          }
        }
      }));
    }
  }
}

// ── NAVIGATION ───────────────────────────────────────────────
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  renderCurrentTab();
}

function switchMes(mes) {
  state.currentMes = mes;
  document.querySelectorAll('.month-tab').forEach(el => el.classList.toggle('active', el.dataset.mes === mes));
  if (state.currentTab === 'por-mes') renderCurrentTab();
}

function renderCurrentTab() {
  const content = document.getElementById('content');
  const tab = state.currentTab;
  let html = '';
  if (tab === 'por-mes')    html = renderPorMes();
  if (tab === 'consolidado') html = renderConsolidado();
  if (tab === 'comparativa') html = renderComparativa();
  if (tab === 'metricas')   html = renderMetricas();
  content.innerHTML = html;
  setTimeout(() => drawCharts(tab), 60);
}

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  const content = document.getElementById('content');

  try {
    // Fetch all sheets in parallel
    const results = await Promise.allSettled(
      SHEETS.map(s => fetch(BASE + s.gid).then(r => { if (!r.ok) throw new Error(r.status); return r.text(); }))
    );

    let loaded = 0;
    results.forEach((res, i) => {
      if (res.status === 'fulfilled') {
        const rows = parseCSV(res.value);
        if (rows.length) {
          state.mesData[SHEETS[i].mes] = buildMesData(rows);
          state.meses.push(SHEETS[i].mes);
          loaded++;
        }
      }
    });

    if (!loaded) throw new Error('Ninguna hoja devolvió datos');

    state.currentMes = state.meses[state.meses.length - 1];

    // Month tabs
    const tabsEl = document.getElementById('month-tabs');
    state.meses.forEach(m => {
      const el = document.createElement('div');
      el.className = 'month-tab' + (m === state.currentMes ? ' active' : '');
      el.dataset.mes = m;
      el.textContent = m;
      el.addEventListener('click', () => switchMes(m));
      tabsEl.appendChild(el);
    });

    // Status
    document.getElementById('status-dot').style.background = '#004836';
    document.getElementById('status-txt').textContent = `${loaded}/${SHEETS.length} hojas · ${new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;
    document.getElementById('foot-ts').textContent = new Date().toLocaleDateString('es-AR');

    // Nav
    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => switchTab(el.dataset.tab));
    });

    renderCurrentTab();

  } catch (err) {
    document.getElementById('status-dot').style.background = '#AB1930';
    document.getElementById('status-txt').textContent = 'Error';
    content.innerHTML = `
      <div class="state">
        <div style="font-size:26px">⚠</div>
        <div class="state-msg">No se pudo cargar el Google Sheet</div>
        <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px">${err.message}</div>
        <button onclick="location.reload()" style="margin-top:14px;padding:7px 18px;background:var(--bordeaux);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px">Reintentar</button>
      </div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
