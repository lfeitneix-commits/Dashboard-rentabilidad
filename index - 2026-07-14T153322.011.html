// ── DETALLE TABLE MANAGEMENT ──────────────────────────────────────
function applyDetalleTable(mes, tipoF, areaF, searchQ){
  const wrap=document.getElementById('det-wrap');
  if(!wrap) return;
  const scroller=wrap.querySelector('div');
  const savedScroll=scroller?scroller.scrollTop:0;
  wrap.innerHTML=buildDetalleTable(mes, tipoF, areaF, searchQ);
  // Restaurar estado visual de secciones expandidas
  ST.expandedSecs.forEach(secId=>{
    const row=wrap.querySelector(`[data-secid="${secId}"]`);
    if(row){
      row.classList.add('sec-open');
      wrap.querySelectorAll(`.sec-child-${secId}`).forEach(r=>{
        const isSubChild=[...r.classList].some(cl=>cl.startsWith('sub-child-'));
        if(!isSubChild) r.style.display='';
      });
    }
  });
  ST.expandedSubs.forEach(subId=>{
    const row=wrap.querySelector(`[data-subid="${subId}"]`);
    if(row){
      row.classList.add('sec-open');
      wrap.querySelectorAll(`.sub-child-${subId}`).forEach(r=>r.style.display='');
    }
  });
  if(savedScroll>0){
    const newScroller=wrap.querySelector('div');
    if(newScroller) requestAnimationFrame(()=>{ newScroller.scrollTop=savedScroll; });
  }
}

// ── FETCH HELPERS ────────────────────────────────────────────────
function repairMojibake(s){
  // Google Sheets CSV sometimes double-encodes UTF-8 as latin-1
  // Fix the most common Spanish/Argentine chars
  return s
    .replace(/NÂº/g,'Nº').replace(/Âº/g,'º').replace(/Â°/g,'°')
    .replace(/Ã'/g,'Ñ').replace(/Ã±/g,'ñ')
    .replace(/Ã"/g,'Ó').replace(/Ã³/g,'ó')
    .replace(/Ã/g,'Á').replace(/Ã¡/g,'á')
    .replace(/Ã‰/g,'É').replace(/Ã©/g,'é')
    .replace(/Ã/g,'Í').replace(/Ã­/g,'í')
    .replace(/Ãš/g,'Ú').replace(/Ãº/g,'ú')
    .replace(/Ã€/g,'À').replace(/Ã /g,'à')
    .replace(/Ã¼/g,'ü').replace(/Ã¤/g,'ä')
    .replace(/Â¿/g,'¿').replace(/Â¡/g,'¡');
}

async function fetchCSV(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status+' — '+url);
  const buf = await r.arrayBuffer();
  let text = new TextDecoder('utf-8').decode(buf);
  // If mojibake detected, repair
  if(text.includes('Ã')||text.includes('NÂ')) text = repairMojibake(text);
  return text;
}

// ── LOAD DATA ────────────────────────────────────────────────────
async function loadData(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spin');
  document.getElementById('sdot').style.background='var(--arena)';
  document.getElementById('stxt').textContent='Cargando…';
  const ts='&t='+Date.now();
  try{
    // Fetch with explicit UTF-8 to avoid mojibake on special chars (Nº etc.)
    // Main sheets + matriz in parallel
    const fetches=[
      ...SHEETS.map(s=>fetchCSV(BASE+s.gid+ts).catch(e=>({_err:e.message}))),
      fetchCSV(BASE+MATRIZ_GID+ts).catch(()=>null),
      fetchCSV(BASE+CAPN_GID+ts).catch(()=>null),
      fetchCSV(BASE+CLASIF_GID+ts).catch(()=>null),
    ];
    const results=await Promise.allSettled(fetches);
    let loaded=0;
    // Process main sheets
    results.slice(0,SHEETS.length).forEach((res,i)=>{
      const val = res.status==='fulfilled' ? res.value : null;
      if(val && !val._err){
        const{headers,rows}=parseCSV(val);
        if(rows.length){
          // New structure: col0=nombre (header vacío), then area columns, then Total, then Notas
          const numCol  = null;
          const nameCol = headers[0]; // vacío '' — nombre de fila está bajo esta key
          const notesCol= headers.find(h=>/nota/i.test(h))||headers.find(h=>/^_col/.test(h))||null;
          // totalGastosCell: sum SUBTOTAL DIRECTOS + GASTOS INDIRECTOS for areas sin CapN
          // Computed after annotateRows
          const annotated=annotateRows(rows,nameCol,numCol,notesCol);
          const subtotalRow=annotated.find(r=>r._kind==='subtotal_dir'&&/^SUBTOTAL\s+DIRECTOS$/i.test(r._nom));
          const indirectosRow=annotated.find(r=>r._kind==='section'&&/^GASTOS\s+INDIRECTOS$/i.test(r._nom));
          const impuestosRow=annotated.find(r=>r._kind==='skip'&&/^Impuestos$/i.test(r._nom));
          const totalGastosCell=(subtotalRow&&indirectosRow)
            ? AREAS.reduce((s,a)=>s+getAreaVal(subtotalRow,a)+getAreaVal(indirectosRow,a),0)
            : null;
          // Also store result rows for detalle display
          const resAntesRow=annotated.find(r=>r._kind==='skip'&&/RESULTADO.*antes.*impuesto/i.test(r._nom));
          const resDespuesRow=annotated.find(r=>r._kind==='skip'&&/RESULTADO.*despu/i.test(r._nom));
          ST.mesData[SHEETS[i].mes]={
            agg:buildAgg(rows,nameCol,numCol,notesCol),
            annotated,
            nameCol,numCol,notesCol,headers,rows,
            totalGastosCell,subtotalRow,indirectosRow,impuestosRow,resAntesRow,resDespuesRow,
          };
          if(!ST.meses.includes(SHEETS[i].mes)) ST.meses.push(SHEETS[i].mes);
          loaded++;
        }
      }
    });
    // Process matriz
    const matrizResult=results[SHEETS.length];
    if(matrizResult.status==='fulfilled'&&matrizResult.value){
      const{rows}=parseCSV(matrizResult.value);
      ST.matrizData=rows;
    }else{
      ST.matrizError='No se pudo cargar la hoja Matriz de gastos';
    }
    // Process clasificación sheet
    const clasifResult=results[SHEETS.length+2];
    if(clasifResult&&clasifResult.status==='fulfilled'&&clasifResult.value){
      const{rows:clasifRows,headers:clasifHeaders}=parseCSV(clasifResult.value);
      ST.clasifData={};
      const normMes=m=>m.charAt(0).toUpperCase()+m.slice(1).toLowerCase();
      const fijoRow=clasifRows.find(r=>String(r[clasifHeaders[0]]||'').trim()==='GASTOS FIJOS');
      const varRow=clasifRows.find(r=>String(r[clasifHeaders[0]]||'').trim()==='GASTOS VARIABLES');
      clasifHeaders.slice(2).forEach(m=>{
        if(!m) return;
        const mNorm=normMes(m.trim());
        ST.clasifData[mNorm]={
          fijos:fijoRow?parseNum(fijoRow[m]||''):0,
          variables:varRow?parseNum(varRow[m]||''):0,
        };
      });
      const totFijos=Object.values(ST.clasifData).reduce((s,v)=>s+v.fijos,0);
      const totVars=Object.values(ST.clasifData).reduce((s,v)=>s+v.variables,0);
      ST.clasifData['__consolidado__']={fijos:totFijos,variables:totVars};
    }

    // Process CapN sheet
    const capnResult=results[SHEETS.length+1];
    if(capnResult&&capnResult.status==='fulfilled'&&capnResult.value){
      const{headers,rows}=parseCSV(capnResult.value);
      ST.capnData={headers,rows};
    }
    if(!loaded)throw new Error('Ninguna hoja devolvió datos');
    if(!ST.currentMes) ST.currentMes=ST.meses[0];
    // Month tabs
    const tabsEl=document.getElementById('month-tabs');tabsEl.innerHTML='';
    ST.meses.forEach(m=>{
      const el=document.createElement('div');
      el.className='mtab'+(m===ST.currentMes?' active':'');
      el.dataset.mes=m;el.textContent=m;
      el.addEventListener('click',()=>switchMes(m));
      tabsEl.appendChild(el);
    });

    document.getElementById('sdot').style.background='#004836';
    document.getElementById('stxt').textContent=`${loaded}/${SHEETS.length} · ${new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;
    renderCurrentTab();
  }catch(err){
    document.getElementById('sdot').style.background='#AB1930';
    document.getElementById('stxt').textContent='Error de conexión';
    document.getElementById('content').innerHTML=`<div class="state">
      <div style="font-size:24px">⚠</div>
      <div class="state-msg" style="margin-bottom:8px">Error al cargar datos</div>
      <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;max-width:400px;text-align:center;word-break:break-all">${err.message}</div>
      <button onclick="loadData()" style="margin-top:16px;padding:8px 20px;background:var(--bordeaux);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif">Reintentar</button>
    </div>`;
  }finally{btn.classList.remove('spin');}
}

document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>switchTab(el.dataset.tab)));
document.getElementById('refresh-btn').addEventListener('click',loadData);
document.addEventListener('DOMContentLoaded',loadData);
</script>
